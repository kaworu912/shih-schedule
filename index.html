<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>多人排班系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">資料同步中...</div>
    </div>

    <div id="authModal" class="auth-overlay">
        <div class="auth-box">
            <h2 id="authTitle">歡迎使用排班系統</h2>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthMode('login')">登入</button>
                <button class="auth-tab" onclick="switchAuthMode('register')">註冊</button>
            </div>
            <div id="loginForm" class="auth-form">
                <div class="form-group">
                    <label>暱稱 (帳號)</label>
                    <input type="text" id="loginUser" placeholder="請輸入暱稱">
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="loginPass" placeholder="請輸入密碼">
                </div>
                <button class="auth-action-btn" onclick="doLogin()">登入</button>
            </div>
            <div id="registerForm" class="auth-form" style="display:none;">
                <div class="form-group">
                    <label>設定暱稱 (帳號)</label>
                    <input type="text" id="regUser" placeholder="例如: Wang">
                </div>
                <div class="form-group">
                    <label>設定密碼</label>
                    <input type="password" id="regPass" placeholder="自訂密碼">
                </div>
                <div class="form-group">
                    <label>所屬組別</label>
                    <select id="regGroup" class="group-select">
                        <option value="甲1">甲1</option>
                        <option value="甲2">甲2</option>
                        <option value="甲3">甲3</option>
                        <option value="乙1">乙1</option>
                        <option value="乙2">乙2</option>
                        <option value="乙3">乙3</option>
                    </select>
                </div>
                <button class="auth-action-btn register-btn" onclick="doRegister()">註冊帳號</button>
            </div>
            <p class="auth-footer">若是公共電腦請記得登出</p>
        </div>
    </div>

    <div class="container">
        
        <div class="controls-wrapper">
            <div class="nav-area">
                <button id="prevBtn" class="nav-btn" onclick="changeMonth(-1)">❮</button>
                <div class="month-display" id="currentMonthDisplay">1月</div>
                <button id="nextBtn" class="nav-btn" onclick="changeMonth(1)">❯</button>
            </div>

            <div class="user-menu-container">
                <div class="user-name-btn" onclick="toggleUserMenu()">
                    <span id="userInfoDisplay">未登入</span>
                    <span class="dropdown-arrow">▼</span>
                </div>
                <div id="userDropdown" class="user-dropdown">
                    <button class="menu-item" id="menuEditBtn" onclick="toggleEditMode()">
                        🔧 修改班表
                    </button>
                    <button class="menu-item" onclick="openLeaveSettings()">
                        ⚙️ 休假設定
                    </button>
                    <button class="menu-item" onclick="openUserListModal()">
                        👀 觀看他人
                    </button>
                    <button class="menu-item logout" onclick="doLogout()">
                        🚪 登出系統
                    </button>
                </div>
            </div>
        </div>

        <div id="viewingOtherAlert" class="viewing-alert" style="display:none;">
            <span>正在觀看: <strong id="viewingTargetName">Name</strong></span>
            <button class="exit-view-btn" onclick="exitViewMode()">返回我的班表</button>
        </div>

        <div class="quick-links">
            <button class="month-btn long-btn" onclick="jumpToToday()">
                📍 回到今天
            </button>
        </div>
        
        <div class="tab-group">
            <button class="tab-btn active" onclick="switchTab('calendar')">📅 班表預覽</button>
            <button class="tab-btn" onclick="switchTab('stats')">📊 休假管理</button>
            <button class="tab-btn" onclick="switchTab('image')">📷 勤務表</button>
        </div>

        <div id="view-calendar" class="view-section active">
            <div id="calendar-container"></div>
        </div>

        <div id="view-stats" class="view-section">
            <div class="stats-page-container">
                
                <h3 style="margin: 0 0 10px 5px; color: #555;">
                    <span id="statsYearDisplay">2026</span> 年度休假概況
                </h3>

                <div id="leaveCardsContainer" class="leave-grid">
                    </div>

            </div>
        </div>

        <div id="view-image" class="view-section">
            <div class="image-page-container">
                
                <div class="upload-card">
                    <h3 class="card-title">新增勤務表</h3>
                    
                    <div class="upload-area-modern">
                        <div class="date-picker-group">
                            <span class="date-picker-label">📅 日期</span>
                            <input type="date" id="rosterDateInput" class="modern-date-input">
                        </div>

                        <div class="image-drop-zone" id="dropZone" onclick="document.getElementById('rosterFileInput').click()">
                            
                            <input type="file" id="rosterFileInput" accept="image/*" style="display: none;" onchange="handleRosterPreview(event)">
                            
                            <div id="uploadPlaceholder" class="placeholder-content">
                                <span class="upload-icon">📷</span>
                                <span class="upload-hint">點擊選擇圖片</span>
                                <span class="upload-sub-hint">或將圖片拖曳至此</span>
                            </div>

                            <div id="previewBox" class="preview-img-box">
                                <img id="uploadPreviewImg" src="">
                            </div>
                            
                            <div id="reselectTag" class="reselect-tag" style="display:none;">點擊更換</div>
                        </div>

                        <button class="upload-confirm-btn" onclick="saveRosterImage()">
                            ⬆️ 確認上傳
                        </button>
                    </div>
                </div>

                <div class="roster-list-area">
                    <h3 class="card-title">已上傳勤務表</h3>
                    <div id="rosterListContainer" class="roster-grid"></div>
                </div>
            </div>
        </div>
        
        <div id="imageViewerModal" class="modal-overlay" onclick="closeImageModal(event)">
            <div class="modal-content image-viewer-content">
                <div class="modal-header">
                    <span id="viewerDateTitle">日期</span>
                    <button type="button" class="close-icon" onclick="event.stopPropagation(); closeImageModalDirect()">✕</button>
                </div>
                <div class="image-wrapper">
                    <img id="viewerImage" src="" alt="勤務表">
                </div>
                <div class="modal-footer">
                    <button class="btn-delete" onclick="deleteCurrentRoster()">🗑️ 刪除此張</button>
                </div>
            </div>
        </div>

    </div>

    <div id="optionModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content option-modal-content">
            <div class="modal-header-simple">
                <h3 id="modalDateTitle">日期</h3>
                <button type="button" class="close-btn-simple" onclick="closeModalDirect()">✕</button>
            </div>
            
            <div id="modalStep1" class="modal-step">
                <div class="category-grid">
                    <button class="cat-btn work" onclick="goToStep2('work')">💼 上班/調整</button>
                    <button class="cat-btn overtime" onclick="goToStep2('overtime')">🔥 加班</button>
                    <button class="cat-btn comp" onclick="goToStep2('comp')">🌙 補休</button>
                    <button class="cat-btn leave" onclick="goToStep2('leave')">🏖️ 請假</button>
                </div>
                <button class="btn-secondary full-width" onclick="confirmModal(true)">🗑️ 清除當日設定</button>
            </div>

            <div id="modalStep2" class="modal-step" style="display:none;">
                <button class="back-link" onclick="backToStep1()">❮ 返回類別</button>
                <h4 id="step2Title">選擇項目</h4>
                
                <div id="step2Options" class="options-grid">
                    </div>

                <div id="customHourArea" class="custom-hour-area" style="display:none;">
                    <label>輸入時數 (小時):</label>
                    <div class="hour-input-wrapper">
                        <button onclick="adjustHour(-1)">-</button>
                        <input type="number" id="customHourInput" value="1" min="1" max="24">
                        <button onclick="adjustHour(1)">+</button>
                    </div>
                </div>

                <button class="btn-primary full-width" onclick="saveOption()">確定</button>
            </div>
        </div>
    </div>

    <div id="leaveSettingsModal" class="modal-overlay" onclick="closeLeaveSettings(event)">
        <div class="modal-content">
            <div class="modal-header-simple">
                <h3>⚙️ 年度休假設定</h3>
                <button type="button" class="close-btn-simple" onclick="closeLeaveSettingsDirect()">✕</button>
            </div>
            <div class="settings-body">
                <p class="hint-text">自行輸入整年度時數 (小時)</p>
                <div class="form-group">
                    <label>特休假</label>
                    <input type="number" id="settingAnnual" placeholder="0">
                </div>
                <div class="form-group">
                    <label>事假 - 預設32</label>
                    <input type="number" id="settingPersonal" value="32">
                </div>
                <div class="form-group">
                    <label>身心假 - 預設24</label>
                    <input type="number" id="settingPsych" value="24">
                </div>
                <div class="form-group">
                    <label>最低休假 - 預設24</label>
                    <input type="number" id="settingMinLeave" value="24">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary full-width" onclick="saveLeaveSettings()">儲存設定</button>
            </div>
        </div>
    </div>

    <div id="userListModal" class="modal-overlay" onclick="closeUserListModal(event)">
        <div class="modal-content user-list-content">
            <div class="modal-header" style="justify-content: space-between; padding-right: 15px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span id="userListTitle">同事列表</span>
                    <button id="toggleBackupBtn" class="toggle-backup-btn" onclick="toggleBackupView()">
                        ♻️ 資源回收桶
                    </button>
                </div>
                <button type="button" class="close-icon" style="position:static; transform:none; width:30px; height:30px; font-size:1.2rem;" onclick="event.stopPropagation(); closeUserListModalDirect()">✕</button>
            </div>
            <div class="user-list-wrapper">
                <div id="userListContainer" class="user-list">
                    <div class="loading-text">載入中...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
