<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>班表系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">資料同步中...</div>
    </div>

    <div id="authModal" class="auth-overlay">
        <div class="auth-box">
            <h2 id="authTitle">歡迎使用班表系統</h2>
            
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthMode('login')">登入</button>
                <button class="auth-tab" onclick="switchAuthMode('register')">註冊</button>
            </div>

            <div id="loginForm" class="auth-form">
                <div class="form-group">
                    <label>暱稱 (帳號)</label>
                    <input type="text" id="loginUser" placeholder="請輸入暱稱">
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="loginPass" placeholder="請輸入密碼">
                </div>
                <button class="auth-action-btn" onclick="doLogin()">登入</button>
            </div>

            <div id="registerForm" class="auth-form" style="display:none;">
                <div class="form-group">
                    <label>設定暱稱 (帳號)</label>
                    <input type="text" id="regUser" placeholder="例如: Wang">
                </div>
                <div class="form-group">
                    <label>設定密碼</label>
                    <input type="password" id="regPass" placeholder="自訂密碼">
                </div>
                <div class="form-group">
                    <label>所屬組別</label>
                    <select id="regGroup" class="group-select">
                        <option value="甲1">甲1</option>
                        <option value="甲2">甲2</option>
                        <option value="甲3">甲3</option>
                        <option value="乙1">乙1</option>
                        <option value="乙2">乙2</option>
                        <option value="乙3">乙3</option>
                    </select>
                </div>
                <button class="auth-action-btn register-btn" onclick="doRegister()">註冊帳號</button>
            </div>
            
            <p class="auth-footer">若是公共電腦請記得登出</p>
        </div>
    </div>

    <div class="container">
        
        <div class="controls-wrapper">
            <div class="nav-area">
                <button id="prevBtn" class="nav-btn" onclick="changeMonth(-1)">❮</button>
                <div class="month-display" id="currentMonthDisplay">1月</div>
                <button id="nextBtn" class="nav-btn" onclick="changeMonth(1)">❯</button>
            </div>

            <div class="user-menu-container">
                <div class="user-name-btn" onclick="toggleUserMenu()">
                    <span id="userInfoDisplay">未登入</span>
                    <span class="dropdown-arrow">▼</span>
                </div>

                <div id="userDropdown" class="user-dropdown">
                    <button class="menu-item" id="menuEditBtn" onclick="toggleEditMode()">
                        🔧 修改班表
                    </button>
                    <button class="menu-item" onclick="openUserListModal()">
                        👀 觀看他人
                    </button>
                    <button class="menu-item logout" onclick="doLogout()">
                        🚪 登出系統
                    </button>
                </div>
            </div>
        </div>

        <div id="viewingOtherAlert" class="viewing-alert" style="display:none;">
            <span>正在觀看: <strong id="viewingTargetName">Name</strong></span>
            <button class="exit-view-btn" onclick="exitViewMode()">返回我的班表</button>
        </div>

        <div class="quick-links">
            <button class="month-btn long-btn" onclick="jumpToToday()">
                📍 回到今天
            </button>
        </div>
        
        <div class="tab-group">
            <button class="tab-btn active" onclick="switchTab('calendar')">📅 班表預覽</button>
            <button class="tab-btn" onclick="switchTab('stats')">📊 補休管理</button>
            <button class="tab-btn" onclick="switchTab('image')">📷 勤務表</button>
        </div>

        <div id="view-calendar" class="view-section active">
            <div id="calendar-container"></div>
        </div>

        <div id="view-stats" class="view-section">
            <div class="stats-page-container compact-layout">
                <h2 class="page-title" id="statsTitle">補休管理</h2>
                
                <div class="stats-row three-cols">
                    <div class="input-card small-card">
                        <label>本月預留</label>
                        <input type="number" id="inputReserved" value="0" placeholder="0" 
                               disabled
                               oninput="calculateBalance()" 
                               onfocus="if(this.value=='0') this.value=''" 
                               onblur="if(this.value=='') this.value='0'">
                    </div>
                    <div class="math-symbol-mini">-</div>
                    <div class="input-card small-card readonly">
                        <label>已使用</label>
                        <input type="number" id="inputUsed" value="0" readonly>
                    </div>
                    <div class="math-symbol-mini">-</div>
                    <div class="input-card small-card readonly">
                        <label>未使用</label>
                        <input type="number" id="inputUnused" value="0" readonly>
                    </div>
                </div>
                
                <div class="result-container">
                    <div class="math-symbol-small">=</div>
                    <div class="result-card light-theme">
                        <label>本月剩餘</label>
                        <span id="txtBalance" class="big-balance">0</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-image" class="view-section">
            <div class="image-page-container">
                <div class="upload-card">
                    <h3 class="card-title">新增勤務表</h3>
                    <div class="upload-row">
                        <input type="date" id="rosterDateInput" class="date-input">
                    </div>
                    <div class="upload-row">
                        <label for="rosterFileInput" class="file-btn">📂 選擇圖片</label>
                        <input type="file" id="rosterFileInput" accept="image/*" style="display: none;" onchange="handleRosterSelect(event)">
                        <span id="fileNameDisplay" class="file-name">未選擇檔案</span>
                    </div>
                    <button class="upload-confirm-btn" onclick="saveRosterImage()">⬆️ 上傳並儲存</button>
                </div>
        
                <div class="roster-list-area">
                    <h3 class="card-title">已上傳勤務表</h3>
                    <div id="rosterListContainer" class="roster-grid">
                        <div class="empty-hint">尚無資料</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="imageViewerModal" class="modal-overlay" onclick="closeImageModal(event)">
            <div class="modal-content image-viewer-content">
                <div class="modal-header">
                    <span id="viewerDateTitle">日期</span>
                    
                    <button type="button" class="close-icon" onclick="event.stopPropagation(); closeImageModalDirect()">✕</button>
                    
                </div>
                <div class="image-wrapper">
                    <img id="viewerImage" src="" alt="勤務表">
                </div>
                <div class="modal-footer">
                    <button class="btn-delete" onclick="deleteCurrentRoster()">🗑️ 刪除此張</button>
                </div>
            </div>
        </div>

    </div> <div id="optionModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content">
            <div class="modal-title" id="modalDateTitle">日期</div>
            <div class="modal-subtitle">可複選</div>
            <div class="modal-options scrollable">
                <div class="opt-group-label">變更班別</div>
                <button class="option-btn" onclick="toggleOption('work_day')">日勤 (8H+2H)</button>
                <button class="option-btn" onclick="toggleOption('work_night')">夜勤 (8H+2H)</button>
                <div class="opt-group-label">加班</div>
                <button class="option-btn" onclick="toggleOption('add_day')">所內加日 (+8/+2)</button>
                <button class="option-btn" onclick="toggleOption('add_night')">所內加夜 (+8/+2)</button>
                <button class="option-btn" onclick="toggleOption('add_full')">所內加全 (+16/+4)</button>
                <button class="option-btn" onclick="toggleOption('hosp_day')">醫加日 (+8/+2)</button>
                <button class="option-btn" onclick="toggleOption('hosp_night')">醫加夜 (+8/+6)</button>
                <button class="option-btn" onclick="toggleOption('hosp_full')">醫全日 (+24)</button>
                <div class="opt-group-label">請假/補休</div>
                <button class="option-btn" onclick="toggleOption('comp_leave')">補休 (扣16)</button>
                <button class="option-btn" onclick="toggleOption('off_day')">日休 (扣9)</button>
                <button class="option-btn" onclick="toggleOption('off_night')">夜休 (扣7)</button>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="confirmModal(true)">清除設定</button>
                <button class="btn-primary" onclick="confirmModal(false)">確定</button>
            </div>
        </div>
    </div>

    <div id="userListModal" class="modal-overlay" onclick="closeUserListModal(event)">
        <div class="modal-content user-list-content">
            <div class="modal-header" style="justify-content: space-between; padding-right: 15px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span id="userListTitle">同事列表</span>
                    <button id="toggleBackupBtn" class="toggle-backup-btn" onclick="toggleBackupView()">
                        ♻️ 資源回收桶
                    </button>
                </div>
                
                <button type="button" class="close-icon" style="position:static; transform:none; width:30px; height:30px; font-size:1.2rem;" onclick="event.stopPropagation(); closeUserListModalDirect()">✕</button>
            </div>
            <div class="user-list-wrapper">
                <div id="userListContainer" class="user-list">
                    <div class="loading-text">載入中...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
